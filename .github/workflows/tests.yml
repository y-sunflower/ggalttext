on:
  push:
    branches: [main]
  pull_request:

name: R unit testing

permissions: read-all

jobs:
  test-units:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Install R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::testthat, any::xml2, any::devtools, github::hrbrmstr/waffle

      - name: Run unit tests
        run: |
          devtools::install(dependencies = TRUE)
          devtools::test(stop_on_failure = TRUE)
        shell: Rscript {0}
